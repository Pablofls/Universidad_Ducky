name: ducky_library
description: Sistema de Gestión de Biblioteca - Universidad Ducky
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navegación
  go_router: ^14.2.7

  # Estado / Auth
  provider: ^6.1.2

  # Íconos (equivalente a lucide-react)
  lucide_icons: ^0.257.0

  # Gráficas (equivalente a recharts)
  fl_chart: ^0.69.0

  # Fuentes de Google
  google_fonts: ^6.2.1

  # Utilidades de fecha
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
